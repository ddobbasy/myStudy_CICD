name: FastAPI Settlement System CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  ci-pipeline:
    # 요구사항 1: GitHub 기본 주최 서버 대신 자체 구축한 self-hosted runner에서 실행합니다.
    runs-on: self-hosted

    steps:
    # 1. 소스 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 파이썬 3.11 환경 설정
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    # 3. 필수 및 개발용 의존성 패키지 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black pytest pytest-cov fastapi httpx pydantic
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Ruff를 이용한 코드 품질 및 린트 검사
    - name: Lint with Ruff
      run: |
        ruff check . --fix

    # 5. Black을 이용한 코드 스타일 통일성 검사
    - name: Check formatting with Black
      run: |
        black --check --diff .

    # 6. Pytest 테스트 수행 및 커버리지 검증 (80% 이상)
    - name: Run tests and verify coverage
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        pytest --cov=settlement --cov-report=term-missing --cov-fail-under=80

    # 7. Docker 빌드 환경 설정 (Buildx 설정)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 8. 요구사항 2: Docker 이미지 빌드 (이미지명: settlement)
    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        load: true # 빌드한 이미지를 로컬 도커 엔진에 로드 (Trivy 스캔용)
        tags: settlement:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 9. 요구사항 3: 빌드된 'settlement' 이미지에 대해 Trivy 취약점 진단 수행
    - name: Run Trivy vulnerability scanner on Docker Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'settlement:latest' # 스캔 대상 이미지
        scan-type: 'image'
        format: 'table'
        severity: 'CRITICAL'           # CRITICAL 등급만 필터링
        ignore-unfixed: true          # 요구사항 4: OS/패키지 벤더사에서 배포한 패키지(패치본)가 없는 취약점은 제외
        exit-code: '1'                 # 조건에 부합하는 취약점 발견 시 파이프라인 실패 처리