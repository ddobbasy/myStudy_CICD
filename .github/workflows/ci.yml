name: FastAPI Settlement System CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  ci-pipeline:
    # runs-on: ubuntu-latest
    runs-on: self-hosted

    steps:
    # 1. 소스 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 파이썬 3.11 환경 설정
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip" # pip 의존성 캐싱으로 빌드 속도 향상

    # 3. 필수 및 개발용 의존성 패키지 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black pytest pytest-cov fastapi httpx pydantic
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Ruff를 이용한 코드 품질 및 린트 검사
    - name: Lint with Ruff
      run: |
        # --format=github 옵션은 에러 발생 시 깃허브 PR 창에 직접 어노테이션을 달아줍니다.
        ruff check . --fix 

    # 5. Black을 이용한 코드 스타일 통일성 검사
    - name: Check formatting with Black
      run: |
        # --check 옵션은 파일 내용을 직접 수정하지 않고, 포맷이 맞지 않으면 빌드를 실패 처리합니다.
        black --check --diff .

    # 6. Pytest 테스트 수행 및 커버리지 검증 (80% 이상 조건 적용)
    - name: Run tests and verify coverage
      run: |
        # pythonpath 설정을 통해 settlement 패키지를 올바르게 인식하도록 유도합니다.
        # --cov-fail-under=80 옵션으로 인해 커버리지가 80% 미만이면 파이프라인이 즉시 실패합니다.
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        pytest --cov=settlement --cov-report=term-missing --cov-fail-under=80

    # 7. Trivy를 이용한 소스 코드 취약점 진단 (CRITICAL 등급 감지)
    - name: Run Trivy vulnerability scanner (FS mode)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL'
        exit-code: '1' # CRITICAL 취약점 발견 시 빌드를 실패(1)로 종료하여 배포를 막음
