name: FastAPI Settlement System CD Pipeline

on:
  workflow_run:
    workflows: ["FastAPI Settlement System CI/CD Pipeline"]
    types:
      - completed

jobs:
  deploy-to-kind:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
    # 1. 소스 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. (추천) 이미 실행 중인 'settlement-local' 이름의 충돌 노드가 있다면 먼저 깔끔하게 삭제
    - name: Clean up existing Kind cluster
      run: |
        if kind get clusters | grep -q '^settlement-local$'; then
          echo "기존에 띄워져 있던 settlement-local 클러스터를 삭제합니다."
          kind delete cluster --name settlement-local
        fi

    # 3. 지정된 이름으로 kind 클러스터 새롭게 생성
    - name: Set up kind Cluster
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: "v0.20.0"
        cluster_name: "settlement-local"

    # 4. 빌드 완료된 도커 이미지를 'settlement-local' 클러스터 내부로 적재
    - name: Load Image into kind Cluster
      run: |
        kind load docker-image settlement:latest --name settlement-local

    # 5. 프로젝트 내 k8s 폴더의 정의 파일을 참조하여 쿠버네티스 배포 수행
    - name: Deploy to kind Cluster using Manifest Files
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl rollout restart deployment/settlement-app
        kubectl get pods
